<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .table-card {
            border-radius: 15px;
            overflow: hidden;
        }

        .table thead {
            background: linear-gradient(135deg, #0d6efd, #0b5ed7);
            color: white;
        }

        .table tbody tr:hover {
            background-color: #f1f5ff;
            transition: 0.3s ease;
        }

        .page-title {
            font-weight: 700;
            color: #343a40;
        }

        .add-btn {
            border-radius: 50px;
            padding: 8px 20px;
        }

    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
             Student Management System
        </a>
    </div>
</nav>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="page-title">Student List</h2>

        <a th:href="@{/students/new}" class="btn btn-primary add-btn">
            + Add Student
        </a>
    </div>

    <div class="card shadow-lg border-0 table-card">
        <div class="card-header bg-white py-3">
            <h5 class="mb-0">Registered Students</h5>
        </div>

        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th class="text-center">Actions</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="student : ${students}">
                    <td th:text="${student.id}"></td>
                    <td th:text="${student.firstName}"></td>
                    <td th:text="${student.lastName}"></td>
                    <td th:text="${student.email}"></td>

                    <td class="text-center">
                        <a th:href="@{/students/update/{id}(id=${student.id})}" class="btn btn-sm btn-outline-primary">
                            Update
                        </a>

                        <a th:href="@{/students/delete/{id}(id=${student.id})}" class="btn btn-sm btn-outline-danger">
                            Delete
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
