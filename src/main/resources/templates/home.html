<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background-color: #f4f4f4;
        }

        nav{
            background-color: #2c3e50;
            color: white;
            padding: 18px 30px;
            font-size: 24px;
            font-weight: bold;
        }

        .hero{
            height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .hero h1{
            font-size: 48px;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .hero p{
            font-size: 20px;
            color: #555;
            margin-bottom: 30px;
            max-width: 700px;
        }

        .btn{
            text-decoration: none;
            background-color: #3498db;
            color: white;
            padding: 12px 25px;
            border-radius: 5px;
            font-size: 18px;
            transition: 0.3s;
        }

        .btn:hover{
            background-color: #2980b9;
        }

        footer{
            text-align: center;
            padding: 15px;
            background-color: #2c3e50;
            color: white;
        }
    </style>
</head>
<body>

<nav>
    Student Management System
</nav>

<section class="hero">
    <h1>Welcome to Student Management System</h1>

    <p>
        Manage student records efficiently. Add, update, view, and delete
        student information through a simple and user-friendly interface.
    </p>

    <a href="/students" class="btn">View Students</a>
</section>

<footer>
    © 2026 Student Management System
</footer>

</body>
</html>
