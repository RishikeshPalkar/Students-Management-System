<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body{
            min-height: 100vh;
            background: linear-gradient(135deg, #f8fafc, #e2e8f0);
            display: flex;
            flex-direction: column;
        }

        nav{
            background: #0f172a;
            color: white;
            padding: 18px 40px;
            font-size: 1.5rem;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .hero{
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .hero h1{
            font-size: 3.5rem;
            color: #0f172a;
            margin-bottom: 20px;
            font-weight: 800;
        }

        .hero p{
            font-size: 1.2rem;
            color: #64748b;
            max-width: 700px;
            line-height: 1.8;
            margin-bottom: 35px;
        }

        .btn{
            text-decoration: none;
            background: #2563eb;
            color: white;
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(37, 99, 235, 0.25);
        }

        .btn:hover{
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        footer{
            text-align: center;
            padding: 18px;
            background: #0f172a;
            color: #cbd5e1;
        }

        @media(max-width: 768px){
            .hero h1{
                font-size: 2.5rem;
            }

            .hero p{
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<nav>
    Student Management System
</nav>

<section class="hero">
    <h1>Welcome to Student Management System</h1>

    <p>
        Manage student records efficiently. Add, update, view, and delete
        student information through a simple and user-friendly interface.
    </p>

    <a th:href="@{/students}" class="btn">View Students</a>
</section>

<footer>
    © 2026 Student Management System
</footer>

</body>
</html>
